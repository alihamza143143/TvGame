<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Party Game</title>
  <link rel="stylesheet" href="display.css">
</head>
<body>
  <!-- SETUP / WAITING SCREEN -->
  <div class="screen active" id="setupScreen">
    <div class="setup-content">
      <div class="game-logo-big">TV PARTY GAME</div>
      <p class="setup-hint">Waiting for host to start the game...</p>
    </div>
  </div>

  <!-- PLAYER TURN SCREEN -->
  <div class="screen" id="playerTurnScreen">
    <div class="turn-content">
      <div class="turn-badge">IT'S YOUR TURN</div>
      <div class="turn-player-name" id="turnPlayerName"></div>
      <div class="turn-instruction">Get ready!</div>
      <div class="round-info" id="roundInfo">Round 1</div>
    </div>
  </div>

  <!-- DICE ROLL SCREEN -->
  <div class="screen" id="diceScreen">
    <div class="dice-content">
      <div class="dice-player-name" id="dicePlayerName"></div>
      <div class="dice-scene">
        <div class="dice-cube" id="diceCube">
          <div class="dice-face face-1"></div>
          <div class="dice-face face-2"></div>
          <div class="dice-face face-3"></div>
          <div class="dice-face face-4"></div>
          <div class="dice-face face-5"></div>
          <div class="dice-face face-6"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- WAITING FOR CARD DRAW SCREEN -->
  <div class="screen" id="waitDrawScreen">
    <div class="wait-draw-content">
      <div class="wait-draw-player" id="waitDrawPlayer"></div>
      <div class="wait-draw-icon">&#127183;</div>
      <div class="wait-draw-text">What will you get?</div>
      <div class="wait-draw-hint">Waiting for host to reveal the card...</div>
    </div>
  </div>

  <!-- CARD REVEAL SCREEN (FULL SCREEN) -->
  <div class="screen" id="cardScreen">
    <div class="card-fullscreen" id="cardFullscreen">
      <div class="card-top-bar" id="cardTopBar">
        <span class="card-cat-icon" id="cardCatIcon"></span>
        <span class="card-cat-name" id="cardCatName"></span>
      </div>
      <div class="card-main-text" id="cardMainText"></div>
      <div class="card-tone" id="cardTone" style="display:none;"></div>
      <div class="card-player-tag" id="cardPlayerTag"></div>
    </div>
  </div>

  <!-- TIMER SCREEN -->
  <div class="screen" id="timerScreen">
    <div class="timer-content">
      <div class="timer-card-text" id="timerCardText"></div>
      <div class="timer-circle">
        <svg class="timer-svg" viewBox="0 0 200 200">
          <circle class="timer-bg" cx="100" cy="100" r="90" />
          <circle class="timer-progress" id="timerProgress" cx="100" cy="100" r="90" />
        </svg>
        <div class="timer-number" id="timerNumber">60</div>
      </div>
      <div class="timer-player" id="timerPlayer"></div>
    </div>
  </div>

  <!-- TURN COMPLETE SCREEN -->
  <div class="screen" id="turnEndScreen">
    <div class="turn-end-content">
      <div class="turn-end-emoji">&#10004;</div>
      <div class="turn-end-text">Turn Complete!</div>
      <div class="turn-end-player" id="turnEndPlayer"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="display.js"></script>
</body>
</html>
